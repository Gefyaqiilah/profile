<section id="experience">
  <div class="container">
    <p class="section-label">Experience</p>

    <div class="timeline">
      <div class="timeline-item" *ngFor="let exp of experiences" [class.open]="exp.open">
        <button class="timeline-header" (click)="toggle(exp)">
          <div class="timeline-meta">
            <span class="role">{{ exp.role }}</span>
            <span class="company mono">{{ exp.company }}</span>
          </div>
          <div class="timeline-right">
            <span class="period mono">{{ exp.period }}</span>
            <span class="chevron">{{ exp.open ? '−' : '+' }}</span>
          </div>
        </button>
        <div class="timeline-body" *ngIf="exp.open">
          <p>{{ exp.description }}</p>
          <div class="tag-list">
            <span class="tag" *ngFor="let t of exp.tags">{{ t }}</span>
          </div>
        </div>
      </div>
    </div>

    <div class="achievements">
      <p class="section-label" style="margin-top: 3rem;">Key Achievements</p>
      <div class="achievement" *ngFor="let a of achievements">
        <span class="ach-marker mono">→</span>
        <p>{{ a }}</p>
      </div>
    </div>
  </div>
</section>
